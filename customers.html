<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PayLater · Customers</title>
  <style>
    :root {
      --bg:      #EAEAEA;
      --surface: #FFFFFF;
      --fg:      #1C1C1E;
      --muted:   #8E8E93;
      --border:  #D1D1D6;
      --accent:  #EF4434;

      --font-display: 'Inter', -apple-system, sans-serif;
      --font-body:    'Inter', -apple-system, sans-serif;
      --font-mono:    'JetBrains Mono', ui-monospace, monospace;

      --gap: 16px;
      --radius: 0px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      padding-bottom: 120px;
    }

    .container {
      max-width: 430px;
      margin: 0 auto;
      padding: var(--gap);
    }

    header {
      padding-block: 24px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 { font-size: 24px; font-weight: 500; margin: 0; }

    .search-container {
      margin-block: 8px 24px;
    }

    .search-input {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      font: inherit;
      font-size: 15px;
    }

    .search-input:focus { outline: 1px solid var(--fg); border-color: var(--fg); }

    .customer-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .customer-card {
      background: var(--surface);
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-decoration: none;
      color: inherit;
      border: 1px solid transparent;
    }

    .customer-card:active { border-color: var(--fg); }

    .customer-info h3 { font-size: 16px; font-weight: 500; margin: 0 0 4px; }
    .customer-info p { font-size: 12px; color: var(--muted); margin: 0; font-family: var(--font-mono); }

    .customer-balance {
      text-align: right;
    }

    .balance-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .balance-val { font-family: var(--font-mono); font-size: 14px; font-weight: 500; }
    .balance-val.overdue { color: var(--accent); }

    .fab {
      position: fixed;
      bottom: 100px;
      right: 24px;
      width: 56px;
      height: 56px;
      background: var(--accent);
      color: var(--surface);
      border: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(239, 68, 52, 0.3);
      z-index: 90;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 398px;
      background: var(--fg);
      display: flex;
      justify-content: space-around;
      padding: 16px;
      z-index: 100;
    }

    .nav-item {
      color: #8E8E93;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Customers</h1>
    </header>

    <div class="search-container">
      <input type="text" class="search-input" placeholder="Search by name or number...">

        </div>

  </div>

  <button class="fab" onclick="location.href='add-customer.html'">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>

    <a href="analytics.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="m7 15 4-4 4 4 5-5"/></svg>

    <a href="settings.html" class="nav-item">

    </a>
  </nav>
</body>
</html>
