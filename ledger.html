<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PayLater · Customer Ledger</title>
  <style>
    :root {
      --bg:      #EAEAEA;
      --surface: #FFFFFF;
      --fg:      #1C1C1E;
      --muted:   #8E8E93;
      --border:  #D1D1D6;
      --accent:  #EF4434;
      --success: #10B981;
      --whatsapp: #25D366;

      --font-display: 'Inter', -apple-system, sans-serif;
      --font-body:    'Inter', -apple-system, sans-serif;
      --font-mono:    'JetBrains Mono', ui-monospace, monospace;

      --gap: 16px;
      --radius: 0px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      padding-bottom: 100px;
    }

    .container {
      max-width: 430px;
      margin: 0 auto;
      padding: var(--gap);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-block: 24px 16px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .profile-hero {
      margin-block: 16px 32px;
    }

    .customer-name {
      font-size: 20px;
      font-weight: 500;
      margin: 0 0 4px;
    }

    .customer-phone {
      font-size: 14px;
      color: var(--muted);
      margin: 0;
      font-family: var(--font-mono);
    }

    .balance-block {
      background: var(--surface);
      padding: 32px 24px;
      margin-bottom: 40px;
      text-align: center;
    }

    .balance-label {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .balance-amount {
      font-size: 40px;
      font-weight: 500;
      font-family: var(--font-mono);
      letter-spacing: -0.02em;
      color: var(--accent);
      margin-bottom: 24px;
    }

    .whatsapp-btn {
      width: 100%;
      background: var(--whatsapp);
      color: white;
      border: 0;
      padding: 16px;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
    }

    .history-section h2 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .timeline-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-block: 20px;
      border-bottom: 1px solid var(--border);
    }

    .item-main {
      display: flex;
      flex-direction: column; gap: 4px;
    }

    .item-date {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
      text-transform: uppercase;
    }

    .item-desc {
      font-size: 15px;
      font-weight: 400;
    }

    .item-amount {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 500;
    }

    .item-amount.credit { color: var(--fg); }
    .item-amount.payment { color: var(--muted); }

    .bottom-nav {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 398px;
      background: var(--fg);
      display: flex;
      justify-content: space-around;
      padding: 16px;
      z-index: 100;
    }

    .nav-item {
      color: var(--muted);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }
  </style>
</head>
<body>
  <div class="container" data-od-id="ledger-container">
    <header data-od-id="header">
      <button class="back-btn" onclick="history.back()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h1 style="font-size: 18px;">Customer Ledger</h1>
      <div style="width: 40px;"></div>
    </header>

    <div class="profile-hero" data-od-id="profile-hero">
      <h2 class="customer-name">Muhammad Shamil</h2>
      <p class="customer-phone">+91 98765 43210</p>
    </div>

    <div class="balance-block" data-od-id="balance-card">
      <p class="balance-label">Remaining Balance</p>
      <div class="balance-amount">$ 3,420.00</div>
      <button class="whatsapp-btn">

        Send WhatsApp Reminder
      </button>
    </div>

    <section class="history-section" data-od-id="activity-timeline">
      <h2>Activity History</h2>
      <div class="timeline">
        <div class="timeline-item">
          <div class="item-main">
            <span class="item-date">24 May 2026</span>
            <span class="item-desc">Bought Groceries</span>
          </div>
          <span class="item-amount credit">+ $450.00</span>
        </div>
        <div class="timeline-item">
          <div class="item-main">
            <span class="item-date">18 May 2026</span>
            <span class="item-desc">UPI Payment Cash</span>
          </div>
          <span class="item-amount payment">- $200.00</span>
        </div>
        <div class="timeline-item">
          <div class="item-main">
            <span class="item-date">10 May 2026</span>
            <span class="item-desc">Rice & Sugar Bulk</span>
          </div>
          <span class="item-amount credit">+ $120.00</span>
        </div>
        <div class="timeline-item">
          <div class="item-main">
            <span class="item-date">02 May 2026</span>
            <span class="item-desc">Initial Ledger Balance</span>
          </div>
          <span class="item-amount credit">+ $3,050.00</span>
        </div>
      </div>
    </section>
  </div>

  <nav class="bottom-nav" data-od-id="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
    </a>
    <a href="analytics.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="m7 15 4-4 4 4 5-5"/></svg>
    </a>
    <a href="settings.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
    </a>
  </nav>
</body>
</html>
